spring.application.name=controlesaidaescolar

app.seguranca.anos-para-delecao=${APP_ANOS_DELECAO:2}
senha.padrao=${APP_SENHA_PADRAO:senhaPadrao}
senha.master=${APP_SENHA_MASTER:senhaMaster}
email.master=${APP_EMAIL_MASTER:emailMaster}
cors.frontend.origin=${CORS_ORIGIN:http://localhost:4200}

jwt.secret=${JWT_SECRET:a4f25ce3d59e5c00d09a2d31fcb6d1a78391c6e4ea85b82b8a1f2147f12783a0q}
jwt.expiration=${JWT_EXPIRATION:720}

app.upload.dir=${APP_UPLOAD_DIR:uploads/fotos}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:5MB}

spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/controle_saida_escolar?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=30000

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

spring.data.web.pageable.max-page-size=5000
spring.data.web.pageable.default-page-size=100

logging.file.name=${LOG_PATH:logs/controle-saida.log}
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=730
logging.logback.rollingpolicy.total-size-cap=2GB
logging.level.com.dougfsilva.controlesaidaescolar=${LOG_LEVEL:INFO}